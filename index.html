<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OptiBotX PRO</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-color: #0f1021;
            --app-bg: #13152a;
            --card-bg: #1a1c36;
            --border-color: #24274c;
            --text-color: #ffffff;
            --text-muted: #797da2;
            --accent-gradient: linear-gradient(90deg, #9b30ff, #ff309b);
            --btn-secondary: #202342;
        }

        body.light-theme {
            --bg-color: #f0f2f7;
            --app-bg: #ffffff;
            --card-bg: #f8f9fa;
            --border-color: #e1e4ed;
            --text-color: #1a1c36;
            --text-muted: #6c757d;
            --accent-gradient: linear-gradient(90deg, #7b1fa2, #e91e63);
            --btn-secondary: #e1e4ed;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* ЭКРАН 1: Меню выбора действий */
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .menu-card {
            background: var(--app-bg); border: 1px solid var(--border-color); border-radius: 32px;
            padding: 40px 24px; width: 88%; max-width: 360px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .menu-crown {
            font-size: 3rem; color: #ffb703; margin-bottom: 16px;
            animation: glowPulse 2s infinite;
        }
        .menu-title {
            font-size: 1.4rem; font-weight: 700; margin-bottom: 32px; letter-spacing: 0.5px;
        }
        .menu-options {
            display: flex; flex-direction: column; gap: 16px;
        }
        .menu-btn {
            background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color);
            padding: 16px 20px; border-radius: 40px; font-size: 1.05rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.2s ease;
        }
        .menu-btn:hover {
            transform: translateY(-2px); border-color: #9b30ff;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР ПРИЛОЖЕНИЯ */
        .app-container {
            width: 100%; max-width: 440px; height: 100vh; background: var(--app-bg);
            display: flex; flex-direction: column; padding: 16px; box-sizing: border-box;
            position: relative; overflow-y: auto;
        }

        /* ХЕДЕР */
        header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
        }
        .brand-wrapper {
            display: flex; align-items: center; gap: 12px;
        }
        .brand-logo {
            width: 42px; height: 42px; background: var(--accent-gradient); border-radius: 12px;
            display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 1.4rem;
        }
        .brand-info h1 {
            font-size: 1.15rem; margin: 0; font-weight: 700;
        }
        .brand-info span {
            font-size: 0.8rem; color: var(--text-muted); display: block; margin-top: 2px;
        }
        .theme-toggle {
            background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color);
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem; transition: all 0.2s;
        }

        /* БЛОК ГРАФИКА TRADINGVIEW */
        .chart-wrapper {
            width: 100%; height: 320px; background: #131722; border-radius: 24px;
            border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 20px;
            position: relative; min-height: 320px;
        }
        #tv-chart-container {
            width: 100%; height: 100%;
        }

        /* ПАНЕЛЬ НАСТРОЕК (АКТИВ И ТАЙМФРЕЙМ) */
        .controls-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
        }
        .select-box {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px;
            padding: 12px 16px; position: relative; cursor: pointer; box-sizing: border-box;
        }
        .select-box label {
            font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px; pointer-events: none;
        }
        .select-box .current-val {
            font-size: 1rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center;
        }
        .select-box .current-val::after {
            content: '▼'; font-size: 0.7rem; color: var(--text-muted); transition: transform 0.2s;
        }
        .select-box.open .current-val::after {
            transform: rotate(180deg);
        }
        
        /* Выпадающие кастомные списки */
        .custom-options {
            position: absolute; bottom: 100%; left: 0; width: 100%; background: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 16px; margin-bottom: 6px;
            max-height: 200px; overflow-y: auto; z-index: 200; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .select-box.open .custom-options {
            display: block;
        }
        .option-item {
            padding: 12px 16px; font-size: 0.95rem; font-weight: 600; transition: background 0.2s;
        }
        .option-item:hover {
            background: var(--border-color);
        }

        /* КНОПКИ ДЕЙСТВИЙ */
        .action-buttons-wrapper {
            display: flex; flex-direction: column; gap: 12px; margin-top: auto;
        }
        .signal-btn {
            background: var(--accent-gradient); border: none; color: white;
            padding: 18px; border-radius: 22px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s ease; box-shadow: 0 8px 24px rgba(155, 48, 255, 0.3);
            text-align: center; position: relative; overflow: hidden;
        }
        .signal-btn:hover {
            transform: translateY(-2px); filter: brightness(1.1);
        }
        .signal-btn.loading {
            pointer-events: none; opacity: 0.8;
        }
        
        .back-btn {
            background: var(--btn-secondary); border: none; color: var(--text-color);
            padding: 14px; border-radius: 22px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .back-btn:hover {
            background: var(--border-color);
        }

        /* ПАНЕЛЬ РЕЗУЛЬТАТА СИГНАЛА */
        .result-panel {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px;
            padding: 14px; text-align: center; font-weight: 700; font-size: 1.1rem;
            margin-bottom: 16px; display: none; animation: slideUp 0.3s ease-out;
        }

        /* АНИМАЦИИ */
        @keyframes glowPulse {
            0% { text-shadow: 0 0 4px rgba(255,183,3,0.4); }
            50% { text-shadow: 0 0 16px rgba(255,183,3,0.8); }
            100% { text-shadow: 0 0 4px rgba(255,183,3,0.4); }
        }
        @keyframes slideUp {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .loader-dots span {
            animation: blink 1.4s infinite both; font-size: 1.4rem; line-height: 0;
        }
        .loader-dots span:nth-child(2) { animation-delay: .2s; }
        .loader-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
    </style>
</head>
<body>

<div id="menu-screen" class="menu-overlay">
    <div class="menu-card">
        <div class="menu-crown">👑</div>
        <div class="menu-title">Выберите действие</div>
        <div class="menu-options">
            <div class="menu-btn" onclick="window.open('https://t.me/ZentixTrade', '_blank')">
                <span>⭐ Отзывы приложения</span>
            </div>
            <div class="menu-btn" onclick="window.open('https://t.me/ZentixTrade', '_blank')">
                <span>🎓 Обучение</span>
            </div>
            <div class="menu-btn" style="background: var(--accent-gradient); color: white; border: none;" onclick="goToApp()">
                <span>▶ Начать работать</span>
            </div>
        </div>
    </div>
</div>

<div class="app-container" id="main-app" style="display: none;">
    <header>
        <div class="brand-wrapper">
            <div class="brand-logo">📈</div>
            <div class="brand-info">
                <h1>OptiBotX PRO</h1>
                <span>ID: 8493021</span>
            </div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </header>

    <div class="chart-wrapper">
        <div id="tv-chart-container"></div>
    </div>

    <div id="result-panel" class="result-panel"></div>

    <div class="controls-grid">
        <div class="select-box" id="asset-select" onclick="toggleDropdown(this)">
            <label>Актив</label>
            <div class="current-val" id="current-asset">EUR/USD</div>
            <div class="custom-options">
                <div class="option-item" onclick="selectAsset('EUR/USD', 'FX:EURUSD')">EUR/USD</div>
                <div class="option-item" onclick="selectAsset('GBP/USD', 'FX:GBPUSD')">GBP/USD</div>
                <div class="option-item" onclick="selectAsset('USD/JPY', 'FX:USDJPY')">USD/JPY</div>
                <div class="option-item" onclick="selectAsset('AUD/USD', 'FX:AUDUSD')">AUD/USD</div>
                <div class="option-item" onclick="selectAsset('EUR/JPY', 'FX:EURJPY')">EUR/JPY</div>
                <div class="option-item" onclick="selectAsset('BTC/USD', 'BINANCE:BTCUSDT')">BTC/USD</div>
            </div>
        </div>

        <div class="select-box" id="tf-select" onclick="toggleDropdown(this)">
            <label>Таймфрейм</label>
            <div class="current-val" id="current-tf" data-value="1">1m</div>
            <div class="custom-options">
                <div class="option-item" onclick="selectTimeframe('1m', '1')">1m</div>
                <div class="option-item" onclick="selectTimeframe('5m', '5')">5m</div>
                <div class="option-item" onclick="selectTimeframe('15m', '15')">15m</div>
                <div class="option-item" onclick="selectTimeframe('1h', '60')">1h</div>
            </div>
        </div>
    </div>

    <div class="action-buttons-wrapper">
        <button id="signal-btn" class="signal-btn" onclick="generateSignal()">Получить сигнал</button>
        <button class="back-btn" onclick="goToMenu()">← Назад в меню</button>
    </div>
</div>

<script>
    let tvWidget = null;
    let currentSymbol = "FX:EURUSD";
    let currentInterval = "1";

    // Переключение экранов
    function goToApp() {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        // Инициализируем график при первом входе
        setTimeout(initTradingView, 100);
    }

    function goToMenu() {
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('result-panel').style.display = 'none';
    }

    // Темы оформления
    function toggleTheme() {
        const body = document.body;
        body.classList.toggle('light-theme');
        const isLight = body.classList.contains('light-theme');
        document.querySelector('.theme-toggle').innerText = isLight ? '☀️' : '🌙';
        // Переинициализация графика с новой темой
        initTradingView();
    }

    // Инициализация TradingView Виджета
    function initTradingView() {
        const isLightTheme = document.body.classList.contains('light-theme');
        
        tvWidget = new TradingView.widget({
            "autosize": true,
            "symbol": currentSymbol,
            "interval": currentInterval,
            "timezone": "Etc/UTC",
            "theme": isLightTheme ? "light" : "dark",
            "style": "1",
            "locale": "ru",
            "toolbar_bg": "rgba(0,0,0,0)",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false,
            "container_id": "tv-chart-container",
            "studies": [
                "RSI@tv-basicstudies"
            ]
        });
    }

    // Логика работы кастомных селекторов
    function toggleDropdown(box) {
        event.stopPropagation();
        const isOpen = box.classList.contains('open');
        closeAllDropdowns();
        if (!isOpen) box.classList.add('open');
    }

    function closeAllDropdowns() {
        document.querySelectorAll('.select-box').forEach(b => b.classList.remove('open'));
    }

    document.addEventListener('click', closeAllDropdowns);

    function selectAsset(name, symbol) {
        document.getElementById('current-asset').innerText = name;
        currentSymbol = symbol;
        initTradingView();
    }

    function selectTimeframe(name, value) {
        const tfElement = document.getElementById('current-tf');
        tfElement.innerText = name;
        tfElement.setAttribute('data-value', value);
        currentInterval = value;
        initTradingView();
    }

    // Имитация генерации торгового сигнала
    function generateSignal() {
        const btn = document.getElementById('signal-btn');
        const resultPanel = document.getElementById('result-panel');
        
        btn.classList.add('loading');
        btn.innerHTML = 'Анализ рынка<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span>';
        resultPanel.style.display = 'none';

        setTimeout(() => {
            btn.classList.remove('loading');
            btn.innerText = 'Получить сигнал';
            
            const isUp = Math.random() > 0.5;
            const accuracy = Math.floor(Math.random() * 14 + 82); // 82% - 95%
            
            resultPanel.style.display = 'block';
            if (isUp) {
                resultPanel.style.color = '#00ff88';
                resultPanel.style.borderColor = 'rgba(0, 255, 136, 0.3)';
                resultPanel.innerHTML = `🟢 ПРОГНОЗ: ВВЕРХ ↑ (${accuracy}%)`;
            } else {
                resultPanel.style.color = '#ff4d4d';
                resultPanel.style.borderColor = 'rgba(255, 77, 77, 0.3)';
                resultPanel.innerHTML = `🔴 ПРОГНОЗ: ВНИЗ ↓ (${accuracy}%)`;
            }

            // Интеграция вибрации Telegram WebApp, если запущено внутри мессенджера
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred(isUp ? 'success' : 'error');
            }
        }, 2000);
    }
</script>
</body>
</html>
