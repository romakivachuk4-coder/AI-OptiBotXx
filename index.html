<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OptiBotX PRO</title>
    <style>
        :root {
            --bg-color: #050510;
            --app-bg: #0b0b1a;
            --border-color: #1a1a2e;
            --text-color: white;
            --secondary-bg: #161625;
            --hover-color: #2a2a3f;
            --accent: #5b4dff;
            --accent-glow: rgba(91, 77, 255, 0.3);
            --glass-bg: rgba(20, 30, 50, 0.6);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        body.light-theme {
            --bg-color: #f0f2f5;
            --app-bg: #ffffff;
            --border-color: #ddd;
            --text-color: #222;
            --secondary-bg: #f5f5f5;
            --hover-color: #e0e0e0;
            --accent: #3f51b5;
            --accent-glow: rgba(63, 81, 181, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
        }
        body {
            margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', sans-serif; height: 100vh; 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
            backdrop-filter: blur(10px);
        }
        .welcome-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        .welcome-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 30px 20px;
            width: 80%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            animation: glassAppear 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: transform 0.3s;
        }
        @keyframes glassAppear {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .welcome-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 10px;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(91,77,255,0.5);
        }
        .welcome-subtitle {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 25px;
        }
        .language-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        .language-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        .language-item:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .language-item.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .language-item .flag {
            font-size: 1.8rem;
        }
        .start-btn {
            background: var(--accent);
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 16px 30px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 0 30px var(--accent-glow);
            transition: all 0.3s;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            width: 100%;
        }
        .start-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px var(--accent-glow);
        }

        .register-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .register-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        .register-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 30px 20px;
            width: 80%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            animation: glassAppear 0.4s forwards;
        }
        .register-glass h3 {
            margin-top: 0;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .register-glass p {
            font-size: 1rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .register-glass .contact {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
            text-decoration: none;
        }
        .register-glass .contact:hover {
            text-decoration: underline;
        }
        .register-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-color);
            font-size: 1rem;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }
        .register-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .register-btn {
            background: var(--accent);
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 0 20px var(--accent-glow);
            margin-bottom: 10px;
        }
        .register-btn:hover {
            transform: scale(1.05);
        }
        .register-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .register-message {
            font-size: 0.9rem;
            min-height: 20px;
            color: #ffaa00;
        }
        .register-message.error {
            color: #ff4d4d;
        }
        .register-message.success {
            color: #00ff88;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--app-bg);
            display: none;
            flex-direction: column;
            padding: 12px 15px;
            box-sizing: border-box;
            position: relative;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            animation: fadeInScale 0.5s ease-out;
            transition: background 0.3s, border-color 0.3s;
            overflow-y: auto;
        }
        @media (max-height: 700px) {
            .app-container {
                padding: 8px 12px;
            }
            .chart-container {
                height: 180px;
            }
            .tf-btn {
                padding: 6px 0;
                font-size: 10px;
            }
            .analyze-btn {
                padding: 12px;
                margin: 6px 0;
            }
        }
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 8px; 
            flex-shrink: 0;
        }
        .logo h1 { 
            font-size: clamp(16px, 4vw, 18px); 
            margin: 0; 
            color: var(--text-color); 
            animation: glowPulse 2s infinite; 
        }
        .logo span { 
            color: var(--accent); 
            font-weight: 800; 
            text-shadow: 0 0 8px var(--accent); 
        }
        .sub-header {
            font-size: 10px;
            color: #444;
            margin-top: 2px;
        }
        .header-buttons { 
            display: flex; 
            gap: 4px; 
            flex-wrap: wrap; 
            justify-content: flex-end;
        }
        .icon-btn { 
            background: var(--secondary-bg); 
            border: 1px solid var(--border-color); 
            color: var(--text-color); 
            padding: 5px 8px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .icon-btn:hover { 
            background: var(--hover-color); 
            transform: scale(1.05); 
        }

        .selector-container {
            position: relative;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8899ac;
            font-size: 16px;
            pointer-events: none;
            z-index: 2;
        }
        #pair-search {
            width: 100%;
            background: var(--secondary-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 12px 10px 40px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
            margin-bottom: 8px;
        }
        #pair-search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        #pair-search::placeholder {
            color: #8899ac;
            font-size: 14px;
        }
        .pairs-container {
            max-height: 200px;
            overflow-y: auto;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 5px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--secondary-bg);
            display: none;
            position: absolute;
            width: 100%;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .pairs-container::-webkit-scrollbar {
            width: 6px;
        }
        .pairs-container::-webkit-scrollbar-track {
            background: var(--secondary-bg);
            border-radius: 10px;
        }
        .pairs-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        .pair-option {
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .pair-option:last-child {
            border-bottom: none;
        }
        .pair-option:hover {
            background: var(--hover-color);
        }
        .pair-option.selected {
            background: var(--accent);
            color: white;
        }
        .pair-option .pair-flag {
            font-size: 1.2rem;
            min-width: 24px;
            text-align: center;
        }
        .pair-option .pair-name {
            flex: 1;
            font-weight: 500;
        }
        .pair-option .pair-type {
            font-size: 10px;
            color: #8899ac;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .pair-option.selected .pair-type {
            color: white;
            background: rgba(255,255,255,0.2);
        }

        #pair {
            display: none;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 240px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        @media (max-height: 700px) {
            .chart-container {
                height: 180px;
            }
        }
        .chart-box { 
            width: 100%; 
            height: 100%; 
            background: var(--app-bg); 
            border-radius: 10px; 
            border: 1px solid var(--border-color);
            position: relative; 
            overflow: hidden;
            transition: box-shadow 0.3s;
        }
        .chart-box:hover { 
            box-shadow: 0 0 20px var(--accent-glow); 
        }
        #mainChart { 
            width: 100%; 
            height: 100%; 
            display: block; 
        }
        .watermark {
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        body.light-theme .watermark {
            color: rgba(0,0,0,0.2);
        }
        .chart-controls {
            position: absolute; 
            top: 5px; 
            right: 5px; 
            display: flex; 
            gap: 5px; 
            z-index: 10;
        }
        .chart-controls button {
            background: var(--secondary-bg); 
            border: 1px solid var(--border-color); 
            color: var(--text-color);
            width: 28px; 
            height: 28px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: bold;
            transition: all 0.3s;
            font-size: 14px;
        }
        .chart-controls button:hover { 
            background: var(--accent); 
            color: white; 
        }

        .tf-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 5px; 
            margin-bottom: 5px; 
            flex-shrink: 0;
        }
        
        .tf-btn, .analyze-btn {
            will-change: transform;
        }
        .tf-btn { 
            background: var(--secondary-bg); 
            border: 1px solid var(--border-color); 
            color: #666; 
            padding: 8px 0; 
            border-radius: 8px; 
            font-size: 11px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            position: relative; 
            overflow: hidden;
            font-weight: 600;
        }
        
        .tf-btn:hover {
            transform: scale(1.05);
            background: var(--hover-color);
            color: var(--text-color);
            border-color: var(--accent);
            z-index: 10;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .tf-btn.active { 
            background: var(--accent); 
            color: white; 
            border-color: var(--accent); 
            box-shadow: 0 0 15px var(--accent-glow);
            animation: pulse 1.5s infinite;
        }

        .analyze-btn { 
            width: 100%; 
            background: var(--accent); 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: clamp(14px, 4vw, 16px); 
            margin: 5px 0;
            transition: all 0.3s; 
            position: relative; 
            overflow: hidden;
            flex-shrink: 0;
        }
        .analyze-btn:hover { 
            background: var(--accent); 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px var(--accent-glow);
        }
        .analyze-btn.cooldown {
            pointer-events: none;
            opacity: 0.7;
        }
        .analyze-btn .btn-text {
            transition: opacity 0.2s;
        }
        .analyze-btn.cooldown .btn-text {
            opacity: 0;
        }
        .timer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .timer-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            animation: spin 1s linear infinite;
            position: absolute;
        }
        .timer-number {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px var(--accent);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-area { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; 
            height: 24px; 
            margin: 5px 0;
            font-size: 13px;
            flex-shrink: 0;
        }
        .dot { 
            width: 10px; 
            height: 10px; 
            background: #2575fc; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #2575fc;
            animation: pulseDot 1.2s infinite;
            will-change: transform;
        }
        
        .result-display { 
            width: 100%;
            height: 36px;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            line-height: 36px;
            margin-bottom: 5px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            box-sizing: border-box;
            font-size: 14px;
            flex-shrink: 0;
        }
        .result-display.visible {
            opacity: 1;
            visibility: visible;
        }

        #snow-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 1000; 
            transition: opacity 0.3s;
        }
        #tooltip {
            position: absolute; 
            background: rgba(0,0,0,0.8); 
            color: white; 
            padding: 4px 8px;
            border-radius: 4px; 
            font-size: 10px; 
            pointer-events: none; 
            z-index: 1001;
            display: none;
        }
        .indicator-btn {
            background: var(--secondary-bg); 
            border: 1px solid var(--border-color); 
            color: var(--text-color);
            padding: 4px 8px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 10px;
            transition: all 0.3s; 
            margin-right: 5px;
        }
        .indicator-btn.active { 
            background: var(--accent); 
            color: white; 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeInScale { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 var(--accent-glow); } 70% { box-shadow: 0 0 0 10px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
        @keyframes pulseDot { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes glowPulse { 0% { text-shadow: 0 0 2px var(--accent); } 50% { text-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent); } 100% { text-shadow: 0 0 2px var(--accent); } }
        @keyframes ripple { 0% { transform: scale(0, 0); opacity: 1; } 20% { transform: scale(25, 25); opacity: 1; } 100% { opacity: 0; transform: scale(40, 40); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-5px); } 40%,80% { transform: translateX(5px); } }

        .chart-box::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(91, 77, 255, 0.05), transparent 50%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="welcome-overlay" class="welcome-overlay visible">
    <div class="welcome-glass">
        <h1 class="welcome-title">Welcome</h1>
        <p class="welcome-subtitle">Choose your language</p>
        <div class="language-list">
            <div class="language-item" data-lang="en"><span class="flag">🇬🇧</span> English</div>
            <div class="language-item" data-lang="es"><span class="flag">🇪🇸</span> Español</div>
            <div class="language-item" data-lang="ru"><span class="flag">🇷🇺</span> Русский</div>
            <div class="language-item" data-lang="pl"><span class="flag">🇵🇱</span> Polski</div>
            <div class="language-item" data-lang="de"><span class="flag">🇩🇪</span> Deutsch</div>
            <div class="language-item" data-lang="fr"><span class="flag">🇫🇷</span> Français</div>
        </div>
        <button id="start-btn" class="start-btn">Start</button>
    </div>
</div>

<div id="register-overlay" class="register-overlay">
    <div class="register-glass">
        <h3 id="register-title">🔐 Access</h3>
        <p id="register-text">To register, contact <a id="dynamic-contact" class="contact" href="https://t.me/ZentixTrade" target="_blank">@ZentixTrade</a> and get an activation code.</p>
        <input type="text" id="code-input" class="register-input" placeholder="Enter code">
        <button id="activate-btn" class="register-btn">Activate</button>
        <div id="register-message" class="register-message"></div>
    </div>
</div>

<div class="app-container" id="main-app" style="display: none;">
    <canvas id="snow-layer"></canvas>
    <div id="tooltip"></div>

    <header>
        <div class="logo">
            <h1>AI OptiBotX <span>PRO</span></h1>
            <div id="sub-header" class="sub-header">Select currency pair</div>
        </div>
        <div class="header-buttons">
            <button id="themeBtn" class="icon-btn" onclick="toggleTheme()">🌓</button>
            <button id="snowToggle" class="icon-btn" onclick="toggleSnow()">☃️</button>
            <button id="langBtn" class="icon-btn">🇬🇧 EN</button>
        </div>
    </header>

    <div class="selector-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="pair-search" placeholder="🔍 Search pair (EUR, USD, OTC...)" autocomplete="off">
        <div class="pairs-container" id="pairs-container"></div>
    </div>
    <select id="pair" onchange="changePair()" style="display: none;"></select>

    <div class="chart-container">
        <div class="chart-box">
            <canvas id="mainChart"></canvas>
            <div id="watermark" class="watermark">OptiBotX PRO</div>
        </div>
        <div class="chart-controls">
            <button onclick="zoomOut()">−</button>
            <button onclick="zoomIn()">+</button>
        </div>
        <div style="position: absolute; bottom: 5px; left: 5px; display: flex; gap: 5px;">

        }));

        if(!snowEnabled) { sCtx.clearRect(0,0,sCanvas.width,sCanvas.height); snowAnimation=requestAnimationFrame(drawSnow); return; }
        sCtx.clearRect(0,0,sCanvas.width,sCanvas.height);
        sCtx.fillStyle="rgba(255,255,255,0.6)";
        flakes.forEach(f=>{
            sCtx.save(); sCtx.translate(f.x,f.y); sCtx.rotate(f.angle*Math.PI/180);
            sCtx.beginPath(); sCtx.arc(0,0,f.r,0,Math.PI*2); sCtx.fill(); sCtx.restore();
            f.y+=f.d; f.x+=Math.sin(f.angle)*0.2;
            if(f.y>sCanvas.height) { f.y=-5; f.x=Math.random()*sCanvas.width; }
            if(f.x>sCanvas.width) f.x=0; if(f.x<0) f.x=sCanvas.width;

    function setupCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
    }

    function initChart() {
        setupCanvas(); candles = [];
        let price = 100;
        for(let i=0; i<candleCount; i++) { 
            let open = price;
            let close = price + (Math.random() - 0.5) * 15;
            candles.push({ 
                open, close, 
                high: Math.max(open, close) + Math.random()*5 + 3, 
                low: Math.min(open, close) - Math.random()*5 - 3,
                progress: 1
            });
            price = close;
        }
        calculateSMA();
        render();
    }

    function calculateSMA(period = 7) {
        smaData = [];
        for (let i = period-1; i < candles.length; i++) {
            let sum = 0;
            for (let j = i-period+1; j <= i; j++) sum += candles[j].close;
            smaData.push({ index: i, value: sum/period });
        }
    }

    function drawGrid(w, h, minP, maxP) {
        ctx.strokeStyle = "#1e1e2f";
        ctx.lineWidth = 0.5;
        const levels = 5;
        for (let i = 0; i <= levels; i++) {
            let y = h * 0.15 + (h * 0.7 / levels) * i;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y);
            ctx.strokeStyle = document.body.classList.contains('light-theme') ? "#ccc" : "#1e1e2f";
            ctx.stroke();
            let price = maxP - (i / levels) * (maxP - minP);
            ctx.fillStyle = "#666"; ctx.font = "8px 'Segoe UI'";
            ctx.fillText(price.toFixed(2), 5, y-2);
        }
        for (let i = 1; i < candles.length; i++) {
            let x = (i / candles.length) * w;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h);
            ctx.strokeStyle = document.body.classList.contains('light-theme') ? "#ddd" : "#1a1a2a";
            ctx.stroke();
        }
    }

    function render() {
        const w = canvas.width / dpr; const h = canvas.height / dpr;
        ctx.clearRect(0,0, w, h);
        const allPrices = candles.flatMap(c => [c.high, c.low]);
        const minP = Math.min(...allPrices); const maxP = Math.max(...allPrices);
        const range = (maxP - minP) || 10;
        const getY = (p) => h - ((p - minP) / range) * (h * 0.7) - (h * 0.15);

        drawGrid(w, h, minP, maxP);

        const candleWidth = w / candles.length;
        candles.forEach((c, i) => {
            const x = i * candleWidth + (candleWidth * 0.15);
            const isUp = c.close >= c.open;
            const color = isUp ? '#00ff88' : '#ff4d4d';
            
            ctx.strokeStyle = color; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(x + (candleWidth * 0.35), getY(c.high)); ctx.lineTo(x + (candleWidth * 0.35), getY(c.low)); ctx.stroke();

            let openY = getY(c.open);
            let closeY = getY(c.close);
            let bodyY, bodyH;
            if (isUp) {
                let currentCloseY = openY - (openY - closeY) * c.progress;
                bodyY = currentCloseY; bodyH = openY - currentCloseY;
            } else {
                let currentCloseY = openY + (closeY - openY) * c.progress;
                bodyY = openY; bodyH = currentCloseY - openY;
            }
            if (c.progress > 0 && bodyH > 0.5) {
                ctx.fillStyle = color;
                ctx.beginPath();
                let rectX = x, rectY = bodyY, rectW = candleWidth * 0.7, rectH = bodyH, radius = 2;
                ctx.moveTo(rectX + radius, rectY); ctx.lineTo(rectX + rectW - radius, rectY);
                ctx.quadraticCurveTo(rectX + rectW, rectY, rectX + rectW, rectY + radius);
                ctx.lineTo(rectX + rectW, rectY + rectH - radius);
                ctx.quadraticCurveTo(rectX + rectW, rectY + rectH, rectX + rectW - radius, rectY + rectH);
                ctx.lineTo(rectX + radius, rectY + rectH);
                ctx.quadraticCurveTo(rectX, rectY + rectH, rectX, rectY + rectH - radius);
                ctx.lineTo(rectX, rectY + radius);
                ctx.quadraticCurveTo(rectX, rectY, rectX + radius, rectY);
                ctx.closePath(); ctx.fill();
            }
        });

        if (showSMA && smaData.length > 1) {
            ctx.beginPath(); ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 2;
            smaData.forEach((pt, idx) => {
                let x = (pt.index / candles.length) * w + candleWidth/2;
                let y = getY(pt.value);
                if (idx === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }
    }

    setInterval(() => {
        if(candles.length === 0) return;
        candles.shift();
        let last = candles[candles.length-1];
        let nO = last.close;
        let nC = nO + (Math.random() - 0.5) * 8;
        let newCandle = { 
            open: nO, close: nC, 
            high: Math.max(nO, nC) + Math.random()*4 + 2, 
            low: Math.min(nO, nC) - Math.random()*4 - 2,
            progress: 0 
        };
        candles.push(newCandle);
        calculateSMA();
        let progress = 0;
        function animateNew() { progress += 0.05; newCandle.progress = Math.min(progress, 1); render(); if (progress < 1) requestAnimationFrame(animateNew); }
        animateNew();
    }, 3000);

    function zoomIn() {
        if (candleCount > 5) candleCount -= 2;
        initChart();
    }
    function zoomOut() {
        if (candleCount < 30) candleCount += 2;
        initChart();
    }
    window.zoomIn = zoomIn;
    window.zoomOut = zoomOut;

    function toggleSMA() {
        showSMA = !showSMA;
        smaBtn.classList.toggle('active', showSMA);
        render();
    }
    window.toggleSMA = toggleSMA;

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const x = (e.clientX - rect.left) * scaleX / dpr;
        const candleWidth = (canvas.width / dpr) / candles.length;
        const idx = Math.floor(x / candleWidth);
        if (idx >= 0 && idx < candles.length) {
            const c = candles[idx];
            document.getElementById('tooltip').style.display = 'block';
            document.getElementById('tooltip').style.left = e.pageX + 10 + 'px';
            document.getElementById('tooltip').style.top = e.pageY - 20 + 'px';
            document.getElementById('tooltip').innerHTML = `O: ${c.open.toFixed(2)} H: ${c.high.toFixed(2)} L: ${c.low.toFixed(2)} C: ${c.close.toFixed(2)}`;
        } else {
            document.getElementById('tooltip').style.display = 'none';
        }
    });
    canvas.addEventListener('mouseleave', () => document.getElementById('tooltip').style.display = 'none');

    function changePair() {
        canvas.style.opacity = '0.3';
        setTimeout(() => {
            initChart();
            canvas.style.opacity = '1';
            document.querySelectorAll('.pair-option').forEach(el => {
                if (el.querySelector('.pair-name')?.innerText === hiddenSelect.value) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        }, 500);
    }
    window.changePair = changePair;

    // --- АНАЛИЗ (с таймером) ---
    function startAnalysis(btn) {
        if (!registered) {
            registerOverlay.classList.add('visible');
            return;
        }
        if (cooldownActive) return;

        cooldownActive = true;
        btn.classList.add('cooldown');

        const timerOverlay = document.createElement('div');
        timerOverlay.className = 'timer-overlay';
        const circle = document.createElement('div');
        circle.className = 'timer-circle';
        const number = document.createElement('span');
        number.className = 'timer-number';
        number.innerText = '5';
        timerOverlay.appendChild(circle);
        timerOverlay.appendChild(number);
        btn.appendChild(timerOverlay);

        let timeLeft = 5;
        const interval = setInterval(() => {
            timeLeft--;
            number.innerText = timeLeft;
            if (timeLeft <= 0) clearInterval(interval);
        }, 1000);

        const res = document.getElementById('result');
        const stat = document.getElementById('status');
        res.classList.remove('visible');
        stat.style.display = 'flex';
        
        setTimeout(() => {
            stat.style.display = 'none'; 
            res.classList.add('visible');
            const isUp = Math.random() > 0.5;
            res.style.color = isUp ? '#00ff88' : '#ff4d4d';
            res.style.borderColor = isUp ? '#00ff88' : '#ff4d4d';
            res.innerHTML = `${dict[curLang][isUp?'up':'down']} (${Math.floor(Math.random()*15+82)}%)`;
            res.style.animation = 'popIn 0.4s';
            setTimeout(() => res.style.animation = '', 400);

            if (window.Telegram?.WebApp?.HapticFeedback) {
                if (isUp) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                } else {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                }
                window.Telegram.WebApp.HapticFeedback.impactOccurred('heavy');
            }
        }, 1500);

        setTimeout(() => {
            clearInterval(interval);
            cooldownActive = false;
            btn.classList.remove('cooldown');
            const overlay = btn.querySelector('.timer-overlay');
            if (overlay) overlay.remove();
        }, 5000);
    }
    window.startAnalysis = startAnalysis;

    // --- АКТИВАЦИЯ ПО КОДУ (новая логика с одноразовыми кодами) ---
    activateBtn.addEventListener('click', () => {
        const code = codeInput.value.trim();
        
        if (isCodeValid(code)) {
            // Помечаем код как использованный
            markCodeAsUsed(code);
            registered = true;
            localStorage.setItem('optibotx_registered', 'true');
            registerMessage.innerText = dict[curLang].success;
            registerMessage.classList.remove('error');
            registerMessage.classList.add('success');
            setTimeout(() => {
                registerOverlay.classList.remove('visible');
                registerMessage.innerText = '';
            }, 1500);
        } else {
            registerMessage.innerText = dict[curLang].wrongCode;
            registerMessage.classList.add('error');
            registerMessage.classList.remove('success');
        }
    });

    registerOverlay.addEventListener('click', (e) => {
        if (e.target === registerOverlay) {
            registerOverlay.classList.remove('visible');
        }
    });

    // --- ВЫБОР ТАЙМФРЕЙМА ---
    function selectTf(btn) {
        document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (window.Telegram?.WebApp?.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }
    }
    window.selectTf = selectTf;

    if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.expand();
    }
</script>
</body>
