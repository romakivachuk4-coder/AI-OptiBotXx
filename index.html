<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OptiBotX PRO</title>
    <style>
        :root {
            --bg-color: #03030a;
            --app-bg: #070714;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #ffffff;
            --secondary-bg: rgba(255, 255, 255, 0.03);
            --hover-color: rgba(255, 255, 255, 0.08);
            --accent: #5b4dff;
            --accent-glow: rgba(91, 77, 255, 0.6);
            --glass-bg: rgba(10, 11, 26, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
            --pro-gradient: linear-gradient(135deg, #ff007f, #7f00ff, #00f0ff);
        }
        body.light-theme {
            --bg-color: #f0f2f5;
            --app-bg: #ffffff;
            --border-color: rgba(0, 0, 0, 0.1);
            --text-color: #1a1a1a;
            --secondary-bg: rgba(0, 0, 0, 0.03);
            --hover-color: rgba(0, 0, 0, 0.06);
            --accent: #3f51b5;
            --accent-glow: rgba(63, 81, 181, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(0, 0, 0, 0.08);
        }
        
        body {
            margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* Общие стили для стекол */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        /* Главное меню */
        .welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
        .welcome-overlay.visible { opacity: 1; visibility: visible; }
        .welcome-glass {
            padding: 35px 25px; width: 90%; max-width: 340px; text-align: center;
            transform: scale(0.9); opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1), opacity 0.4s;
        }
        .welcome-overlay.visible .welcome-glass { transform: scale(1); opacity: 1; }
        
        .welcome-title {
            font-size: 2.2rem; font-weight: 900; margin: 0 0 5px; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .welcome-subtitle { font-size: 0.95rem; color: #8899ac; margin-bottom: 30px; }
        
        .menu-list { display: flex; flex-direction: column; gap: 14px; }
        .menu-item {
            background: var(--secondary-bg); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 16px 20px; font-size: 1.05rem; font-weight: 600;
            display: flex; align-items: center; gap: 15px; cursor: pointer; transition: all 0.3s;
            color: var(--text-color); text-decoration: none;
        }
        .menu-item:hover {
            background: var(--hover-color); transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .menu-item.pro-btn {
            background: var(--pro-gradient); color: white; border: none;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }
        .menu-item.pro-btn:hover {
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5);
        }

        /* Окно активации */
        .register-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center;
            z-index: 20000; opacity: 0; visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .register-overlay.visible { opacity: 1; visibility: visible; }
        .register-glass {
            padding: 35px 25px; width: 90%; max-width: 340px; text-align: center;
            transform: translateY(20px); transition: transform 0.3s, opacity 0.3s; opacity: 0;
        }
        .register-overlay.visible .register-glass { transform: translateY(0); opacity: 1; }
        .register-glass h3 {
            font-size: 1.5rem; margin: 0 0 10px; font-weight: 700;
            background: linear-gradient(135deg, #fff, #b9aaff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .register-glass p { font-size: 0.95rem; color: #8899ac; margin-bottom: 25px; line-height: 1.4; }

        .register-input {
            width: 100%; padding: 16px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border); border-radius: 16px;
            color: white; font-size: 1rem; text-align: center; margin-bottom: 15px;
            outline: none; transition: all 0.2s; box-sizing: border-box;
        }
        .register-input:focus {
            border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow);
        }
        .register-input.error-shake { animation: shake 0.4s ease-in-out; border-color: #ff4d4d; }

        .glow-button {
            background: var(--accent); border: none; color: white;
            font-size: 1.05rem; font-weight: 700; padding: 16px 20px;
            border-radius: 16px; cursor: pointer; width: 100%; transition: all 0.3s;
            box-shadow: 0 4px 20px var(--accent-glow); display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .glow-button:hover {
            transform: translateY(-2px); box-shadow: 0 6px 25px var(--accent-glow); filter: brightness(1.1);
        }
        .contact-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: var(--text-color); font-size: 1rem; font-weight: 600; padding: 14px 20px;
            border-radius: 16px; cursor: pointer; width: 100%; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; box-sizing: border-box; margin-top: 12px;
        }
        .contact-btn:hover { background: rgba(255,255,255,0.1); }

        .register-message { font-size: 0.85rem; min-height: 20px; margin-top: 14px; transition: all 0.2s; }
        .register-message.error { color: #ff6b6b; }
        .register-message.success { color: #69f0ae; }

        /* Контейнер приложения */
        .app-container {
            width: 100%; max-width: 430px; height: 100vh; background: var(--app-bg);
            display: none; flex-direction: column; padding: 15px; box-sizing: border-box;
            position: relative; animation: fadeInScale 0.4s ease-out; overflow-y: auto;
        }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo h1 { font-size: 1.25rem; margin: 0; color: var(--text-color); font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .logo h1 span {
            background: var(--pro-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; animation: logoGlow 3s infinite alternate;
        }
        .sub-header { font-size: 0.75rem; color: #52667d; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .header-buttons { display: flex; gap: 8px; }
        .icon-btn { 
            background: var(--secondary-bg); border: 1px solid var(--border-color); color: var(--text-color);
            width: 38px; height: 38px; border-radius: 12px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
        }
        .icon-btn:hover { background: var(--hover-color); transform: scale(1.05); }

        /* Выбор пары */
        .selector-container { position: relative; margin-bottom: 12px; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #52667d; font-size: 14px; pointer-events: none; }
        #pair-search {
            width: 100%; background: var(--secondary-bg); color: var(--text-color);
            border: 1px solid var(--border-color); border-radius: 14px;
            padding: 14px 14px 14px 42px; font-size: 0.95rem; outline: none; box-sizing: border-box; transition: all 0.3s;
        }
        #pair-search:focus { border-color: var(--accent); background: rgba(0,0,0,0.2); }
        
        .pairs-container {
            max-height: 220px; overflow-y: auto; background: var(--app-bg);
            border: 1px solid var(--border-color); border-radius: 14px;
            position: absolute; width: 100%; z-index: 100; display: none; margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .pair-option {
            padding: 12px 16px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color);
        }
        .pair-option:hover { background: var(--hover-color); }
        .pair-option.selected { background: var(--accent); color: white; }
        .pair-option .pair-name { flex: 1; font-weight: 600; font-size: 0.95rem; }
        .pair-option .pair-type { font-size: 11px; color: #8899ac; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 6px; }

        /* Виджет TradingView */
        .chart-container {
            width: 100%; height: 320px; margin-bottom: 15px; border-radius: 16px;
            overflow: hidden; border: 1px solid var(--border-color); position: relative;
            background: #131722;
        }
        #tv-chart-wrapper { width: 100%; height: 100%; }

        /* Кнопка анализа */
        .analyze-btn { margin: 10px 0; padding: 16px; font-size: 1.1rem; }
        
        /* Статус и сигналы */
        .status-area { display: flex; justify-content: center; align-items: center; gap: 10px; height: 30px; margin: 5px 0; font-size: 0.95rem; color: #8899ac; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulseDot 1.2s infinite; }
        
        .result-display { 
            width: 100%; height: 54px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color);
            border-radius: 14px; text-align: center; font-weight: 800; line-height: 52px; margin-bottom: 15px;
            opacity: 0; transform: translateY(10px); transition: all 0.3s; font-size: 1.2rem; box-sizing: border-box;
        }
        .result-display.visible { opacity: 1; transform: translateY(0); }
        .result-up { color: #00e676; background: rgba(0, 230, 118, 0.05); border-color: rgba(0, 230, 118, 0.2); }
        .result-down { color: #ff3d00; background: rgba(255, 61, 0, 0.05); border-color: rgba(255, 61, 0, 0.2); }

        /* Кнопка Назад в меню */
        .back-to-menu {
            text-align: center; margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border-color);
        }
        .back-link { color: #52667d; text-decoration: none; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s; }
        .back-link:hover { color: var(--text-color); }

        /* Анимации */
        @keyframes fadeInScale { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); } 40%,80% { transform: translateX(6px); } }
        @keyframes pulseDot { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes logoGlow { from { filter: drop-shadow(0 0 2px var(--accent)); } to { filter: drop-shadow(0 0 8px #ff007f); } }
    </style>
    <!-- Подключаем библиотеку TradingView Widget -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<!-- Главный экран (Выбор разделов) -->
<div id="welcome-overlay" class="welcome-overlay visible">
    <div class="welcome-glass glass-panel">
        <h1 class="welcome-title">OptiBotX PRO</h1>
        <p class="welcome-subtitle">Professional Trading Platform</p>
        <div class="menu-list">
            <div class="menu-item pro-btn" id="menu-start">📈 Торговая Панель</div>
            <div class="menu-item" id="menu-activate">🔐 Активация PRO</div>
            <a class="menu-item" href="https://t.me/ZentixTrade" target="_blank">🎬 Влог Правды</a>
            <a class="menu-item" href="https://t.me/ZentixTrade" target="_blank">⭐ Отзывы Клиентов</a>
        </div>
    </div>
</div>

<!-- Окно активации -->
<div id="register-overlay" class="register-overlay">
    <div class="register-glass glass-panel">
        <h3>🔐 Активация OptiBotX PRO</h3>
        <p>Получите полный доступ к торговой платформе.</p>
        
        <input type="text" id="code-input" class="register-input" placeholder="Введите код активации" autocomplete="off">
        
        <button id="activate-btn" class="glow-button">🚀 Активировать доступ</button>
        <a id="contactMeBtn" class="contact-btn" href="https://t.me/optixbot_bot" target="_blank">🤖 Получить доступ</a>
        
        <div id="register-message" class="register-message"></div>
        <div style="margin-top: 20px;"><a href="#" id="close-activation" style="color: #52667d; font-size: 0.85rem; text-decoration: none;">Назад</a></div>
    </div>
</div>

<!-- Главное приложение -->
<div class="app-container" id="main-app">
    <header>
        <div class="logo">
            <h1>OptiBotX <span>PRO</span></h1>
            <div class="sub-header">Powered by TradingView</div>
        </div>
        <div class="header-buttons">
            <button id="themeBtn" class="icon-btn">🌓</button>
        </div>
    </header>

    <!-- Поиск и выбор пар -->
    <div class="selector-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="pair-search" placeholder="Поиск валютной пары..." autocomplete="off">
        <div class="pairs-container" id="pairs-container"></div>
    </div>
    <select id="pair" style="display: none;"></select>

    <!-- График TradingView -->
    <div class="chart-container">
        <div id="tv-chart-wrapper"></div>
    </div>

    <!-- Анализ и Получение сигналов -->
    <button id="anBtn" class="glow-button analyze-btn" onclick="startAnalysis()">
        🚀 Запустить анализ
    </button>

    <div id="status" class="status-area" style="visibility: hidden;">
        <div class="dot"></div> <span id="wait-msg">Анализ рынка...</span>
    </div>

    <div id="result" class="result-display"></div>

    <!-- Кнопка возврата в меню -->
    <div class="back-to-menu">
        <a href="#" id="back-link" class="back-link">🏠 Главный экран</a>
    </div>
</div>

<script>
    // Коды доступа
    const VALID_ACCESS_CODES = ["OPTIX777", "PRO2026", "TRADE99", "BOTX100", "VIPACCESS"];

    let isActivated = localStorage.getItem('optibotx_activated') === 'true';
    let tvWidget = null;
    let currentSymbol = "FX:EURUSD"; // Валютная пара по умолчанию для TradingView

    // Элементы UI
    const welcomeOverlay = document.getElementById('welcome-overlay');
    const registerOverlay = document.getElementById('register-overlay');
    const mainApp = document.getElementById('main-app');
    const codeInput = document.getElementById('code-input');
    const activateBtn = document.getElementById('activate-btn');
    const registerMessageDiv = document.getElementById('register-message');
    const pairsContainer = document.getElementById('pairs-container');
    const searchInput = document.getElementById('pair-search');
    const hiddenSelect = document.getElementById('pair');
    const anBtn = document.getElementById('anBtn');
    const statusArea = document.getElementById('status');
    const resultDisplay = document.getElementById('result');

    // Список валютных пар (соответствует тикерам TradingView)
    const allPairs = [
        { name: "EUR/USD", ticker: "FX:EURUSD", flag: "🇪🇺🇺🇸", type: "Forex" },
        { name: "GBP/USD", ticker: "FX:GBPUSD", flag: "🇬🇧🇺🇸", type: "Forex" },
        { name: "USD/JPY", ticker: "FX:USDJPY", flag: "🇺🇸🇯🇵", type: "Forex" },
        { name: "AUD/USD", ticker: "FX:AUDUSD", flag: "🇦🇺🇺🇸", type: "Forex" },
        { name: "USD/CAD", ticker: "FX:USDCAD", flag: "🇺🇸🇨🇦", type: "Forex" }
    ];

    // Инициализация виджета TradingView
    function initTradingView(symbol) {
        currentSymbol = symbol;
        tvWidget = new TradingView.widget({
            "width": "100%",
            "height": "100%",
            "symbol": symbol,
            "interval": "1",
            "timezone": "Etc/UTC",
            "theme": document.body.classList.contains('light-theme') ? "light" : "dark",
            "style": "1", // Японские свечи
            "locale": "ru",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_side_toolbar": true,
            "allow_symbol_change": false,
            "container_id": "tv-chart-wrapper",
            "studies": []
        });
    }

    // Навигация по экранам
    document.getElementById('menu-start').onclick = () => {
        if (isActivated) {
            welcomeOverlay.classList.remove('visible');
            mainApp.style.display = 'flex';
            setTimeout(() => { initTradingView(currentSymbol); }, 200);
        } else {
            registerOverlay.classList.add('visible');
        }
    };

    document.getElementById('menu-activate').onclick = () => { registerOverlay.classList.add('visible'); };
    document.getElementById('close-activation').onclick = (e) => { e.preventDefault(); registerOverlay.classList.remove('visible'); };
    document.getElementById('back-link').onclick = (e) => { e.preventDefault(); mainApp.style.display = 'none'; welcomeOverlay.classList.add('visible'); };
    document.getElementById('themeBtn').onclick = () => { 
        document.body.classList.toggle('light-theme'); 
        initTradingView(currentSymbol); // Перерисовываем график с новой темой
    };

    // Проверка ключа
    activateBtn.onclick = () => {
        let code = codeInput.value.trim().toUpperCase();
        if (VALID_ACCESS_CODES.includes(code)) {
            isActivated = true;
            localStorage.setItem('optibotx_activated', 'true');
            registerMessageDiv.innerText = "✅ Доступ активирован!";
            registerMessageDiv.className = "register-message success";
            setTimeout(() => {
                registerOverlay.classList.remove('visible');
                welcomeOverlay.classList.remove('visible');
                mainApp.style.display = 'flex';
                initTradingView(currentSymbol);
            }, 1000);
        } else {
            registerMessageDiv.innerText = "❌ Неверный код доступа";
            registerMessageDiv.className = "register-message error";
            codeInput.classList.add('error-shake');
            setTimeout(() => codeInput.classList.remove('error-shake'), 400);
        }
    };

    // Отрисовка списка пар
    function renderPairs(filter = '') {
        const filterLower = filter.toLowerCase();
        const filtered = allPairs.filter(p => p.name.toLowerCase().includes(filterLower));
        pairsContainer.innerHTML = '';
        filtered.forEach(pair => {
            const div = document.createElement('div');
            div.className = 'pair-option';
            if(pair.ticker === currentSymbol) div.classList.add('selected');
            div.innerHTML = `<span class="pair-flag">${pair.flag}</span><span class="pair-name">${pair.name}</span><span class="pair-type">${pair.type}</span>`;
            
            div.addEventListener('click', () => { 
                currentSymbol = pair.ticker;
                searchInput.value = pair.name;
                pairsContainer.style.display = 'none';
                initTradingView(pair.ticker);
            });
            pairsContainer.appendChild(div);
        });
    }

    searchInput.addEventListener('focus', () => { renderPairs(searchInput.value); pairsContainer.style.display = 'block'; });
    document.addEventListener('click', (e) => { if (!searchInput.contains(e.target) && !pairsContainer.contains(e.target)) pairsContainer.style.display = 'none'; });
    searchInput.addEventListener('input', (e) => { renderPairs(e.target.value); });

    // Логика кнопки "Запустить анализ"
    let isAnalyzing = false;
    function startAnalysis() {
        if (isAnalyzing) return;
        isAnalyzing = true;
        
        anBtn.disabled = true;
        statusArea.style.visibility = 'visible';
        resultDisplay.className = 'result-display';
        resultDisplay.innerText = '';

        setTimeout(() => {
            isAnalyzing = false;
            anBtn.disabled = false;
            statusArea.style.visibility = 'hidden';

            const winRate = Math.floor(Math.random() * (98 - 82 + 1)) + 82; // 82% - 98%
            const direction = Math.random() > 0.5 ? "ВВЕРХ" : "ВНИЗ";
            
            if (direction === "ВВЕРХ") {
                resultDisplay.innerText = `⬆ ВВЕРХ ${winRate}%`;
                resultDisplay.classList.add('visible', 'result-up');
            } else {
                resultDisplay.innerText = `⬇ ВНИЗ ${winRate}%`;
                resultDisplay.classList.add('visible', 'result-down');
            }
        }, 2500); // Имитация анализа 2.5 секунды
    }

    // Первичный пресет строки поиска
    searchInput.value = allPairs[0].name;
</script>
</body>
</html>
